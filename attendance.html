<!DOCTYPE html>
<html>

<head>
    <title>Attendance</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            background-color: #e4f1e1;
        }

        .sidebar {
            width: 250px;
            background: #9dc183;
            color: white;
            height: 100vh;
            padding: 20px;
        }

        .sidebar p {
            padding: 15px;
            cursor: pointer;
            border-radius: 12px;
            margin: 10px 0;
            color: white;
        }

        .sidebar p:hover {
            background: #87a96b;
        }

        .main-content {
            flex: 1;
            padding: 40px;
        }

        /* Table Style with Floral Background */
        .content-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #ff99cc;
            background-image: radial-gradient(#ffcce6 10%, transparent 10%);
            background-size: 30px 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 15px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            color: #ff99cc;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>Menu</h2>
        <a href="dashboard.html" style="text-decoration:none; color:white;">
            <p>Dashboard</p>
        </a>
        <a href="profile.html" style="text-decoration:none; color:white;">
            <p>Profile</p>
        </a>
        <p style="background:#87a96b;">Attendance</p>
        <a href="leave.html" style="text-decoration:none; color:white;">
            <p>Leave Request</p>
        </a>
    </div>
    <div class="main-content">
        <div class="content-card">
            <h2>Attendance Report</h2>
            <table>
                <tr>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
                <tr>
                    <td>01 July 2026</td>
                    <td>Absent</td>
                </tr>
                <tr>
                    <td>02 July 2026</td>
                    <td>Present</td>
                </tr>
                <tr>
                    <td>03 July 2026</td>
                    <td>Present</td>
                </tr>
            </table>
        </div>
    </div>
</body>

</html>
