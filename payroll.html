<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Payroll View</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            background-color: #e4f1e1;
        }

        .sidebar {
            width: 250px;
            background: #9dc183;
            color: white;
            height: 100vh;
            padding: 20px;
        }

        .sidebar p {
            padding: 15px;
            cursor: pointer;
            border-radius: 12px;
            margin: 10px 0;
            color: white;
        }

        .sidebar p:hover {
            background: #87a96b;
        }

        .main-content {
            flex: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .payroll-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            width: 500px;
            border: 2px solid #ff99cc;
            background-image: radial-gradient(#ffcce6 10%, transparent 10%);
            background-size: 30px 30px;
        }

        h2 {
            color: #ff99cc;
            text-align: center;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>Menu</h2>
        <a href="dashboard.html" style="text-decoration:none;">
            <p>Dashboard</p>
        </a>
        <a href="profile.html" style="text-decoration:none;">
            <p>Profile</p>
        </a>
        <a href="attendance.html" style="text-decoration:none;">
            <p>Attendance</p>
        </a>
        <a href="leave.html" style="text-decoration:none;">
            <p>Leave Request</p>
        </a>
        <p style="background:#87a96b;">Payroll</p>
    </div>
    <div class="main-content">
        <div class="payroll-card">
            <h2>Salary Details</h2>
            <div class="info-row"><span>Basic Salary</span> <span>₹ 50,000</span></div>
            <div class="info-row"><span>HRA</span> <span>₹ 10,000</span></div>
            <div class="info-row"><span>Professional Tax</span> <span>- ₹ 200</span></div>
            <div class="info-row" style="font-weight:bold; color:#ff99cc;"><span>Net Salary</span> <span>₹ 59,800</span>
            </div>
        </div>
    </div>
</body>

</html>
