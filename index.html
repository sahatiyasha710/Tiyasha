<!DOCTYPE html>
<html>

<head>
    <title>HRMS Login</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        form {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 320px;
            backdrop-filter: blur(10px);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid transparent;
            border-radius: 10px;
            background: #f0f0f0;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #5c67f2;
            background: white;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #5c67f2;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(92, 103, 242, 0.4);
        }
    </style>
</head>

<body>
    <form action="dashboard.html">
        <h2>Welcome Back</h2>
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
        <button type="submit">Sign In</button>
    </form>
</body>

</html>
